workflows:
  android-workflow:
    name: MediCall Android
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
   scripts:
      - name: Recreate Android and Get dependencies
        script: |
          flutter create . --platforms=android
          flutter pub get
      - name: Configure Android SDK Version
        script: |
          sed -i '' 's/compileSdk = .*/compileSdk = 34/g' android/app/build.gradle
          sed -i '' 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle
      - name: Build APK
        script: |
          flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
